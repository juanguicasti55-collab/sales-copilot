<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 Sales Copilot — Coach en Tiempo Real</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #14141f;
    --surface2: #1e1e2e;
    --border: #2a2a3e;
    --text: #e0e0e0;
    --muted: #888;
    --accent: #6c5ce7;
    --green: #00b894;
    --red: #e74c3c;
    --yellow: #fdcb6e;
    --blue: #74b9ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ─── Header ─── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
  }

  .status-badge.listening {
    background: rgba(0, 184, 148, 0.15);
    color: var(--green);
  }

  .status-badge.paused {
    background: rgba(253, 203, 110, 0.15);
    color: var(--yellow);
  }

  .status-badge.off {
    background: rgba(136, 136, 136, 0.15);
    color: var(--muted);
  }

  .pulse {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  /* ─── Controls ─── */
  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .call-type-select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }

  .btn {
    padding: 8px 18px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-start {
    background: var(--green);
    color: #fff;
  }
  .btn-start:hover { background: #00a884; }

  .btn-stop {
    background: var(--red);
    color: #fff;
  }
  .btn-stop:hover { background: #c0392b; }

  .btn-summary {
    background: var(--accent);
    color: #fff;
  }
  .btn-summary:hover { background: #5a4bd1; }

  .btn-reset {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-mini {
    background: var(--surface2);
    color: var(--blue);
    border: 1px solid var(--border);
    margin-left: auto;
  }
  .btn-mini:hover { background: rgba(116, 185, 255, 0.15); }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ─── Main Layout ─── */
  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    flex: 1;
    overflow: hidden;
  }

  .panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .panel-left {
    border-right: 1px solid var(--border);
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    scroll-behavior: smooth;
  }

  /* ─── Transcript ─── */
  .transcript-line {
    padding: 8px 12px;
    margin-bottom: 6px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.5;
    background: var(--surface2);
    border-left: 3px solid var(--border);
  }

  .transcript-line .time {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .transcript-current {
    border-left-color: var(--green);
    background: rgba(0, 184, 148, 0.08);
  }

  /* ─── Coaching Cards ─── */
  .coach-card {
    padding: 14px 16px;
    margin-bottom: 10px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    animation: slideIn 0.3s ease;
    white-space: pre-wrap;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .coach-card.objection {
    background: rgba(231, 76, 60, 0.1);
    border: 1px solid rgba(231, 76, 60, 0.3);
  }

  .coach-card.signal {
    background: rgba(253, 203, 110, 0.1);
    border: 1px solid rgba(253, 203, 110, 0.3);
  }

  .coach-card.close {
    background: rgba(0, 184, 148, 0.1);
    border: 1px solid rgba(0, 184, 148, 0.3);
  }

  .coach-card.tactic {
    background: rgba(116, 185, 255, 0.1);
    border: 1px solid rgba(116, 185, 255, 0.3);
  }

  .coach-card.alert {
    background: rgba(231, 76, 60, 0.15);
    border: 1px solid rgba(231, 76, 60, 0.4);
  }

  .coach-card.ok {
    background: rgba(0, 184, 148, 0.05);
    border: 1px solid rgba(0, 184, 148, 0.15);
    color: var(--muted);
  }

  .coach-time {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* ─── Summary Modal ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 90%;
    max-width: 700px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .modal-header h2 { font-size: 18px; }

  .modal-body {
    padding: 20px;
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .modal-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .btn-copy {
    background: var(--accent);
    color: #fff;
  }

  .btn-close-modal {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* ─── Loading ─── */
  .loading {
    display: inline-flex;
    gap: 4px;
    padding: 8px 0;
  }

  .loading span {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .loading span:nth-child(2) { animation-delay: 0.2s; }
  .loading span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* ─── Empty State ─── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    text-align: center;
    gap: 12px;
  }

  .empty-state .icon { font-size: 48px; }
  .empty-state p { font-size: 14px; max-width: 280px; }

  /* ─── Mini Mode ─── */
  body.mini-mode header { padding: 6px 12px; }
  body.mini-mode .logo { font-size: 14px; }
  body.mini-mode .controls { padding: 6px 12px; gap: 4px; flex-wrap: wrap; }
  body.mini-mode .btn { padding: 5px 10px; font-size: 12px; }
  body.mini-mode .call-type-select { padding: 5px 8px; font-size: 12px; }
  body.mini-mode .main { grid-template-columns: 1fr; }
  body.mini-mode .panel-left { display: none; }
  body.mini-mode .coach-card { padding: 10px 12px; font-size: 13px; margin-bottom: 6px; }
  body.mini-mode .panel-header { padding: 6px 12px; font-size: 11px; }
  body.mini-mode .status-badge { font-size: 11px; padding: 2px 8px; }

  /* ─── Responsive ─── */
  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; grid-template-rows: 40% 60%; }
    .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🎯 Sales Copilot</div>
  <div class="status-badge off" id="statusBadge">
    <div class="pulse"></div>
    <span id="statusText">Inactivo</span>
  </div>
</header>

<div class="controls">
  <select class="call-type-select" id="callType">
    <option value="ventas">🔥 Venta</option>
    <option value="onboarding">🚀 Onboarding</option>
    <option value="consultoria">💡 Consultoría / Mentoría</option>
  </select>

  <button class="btn btn-start" id="btnStart" onclick="startListening()">▶ Iniciar</button>
  <button class="btn btn-stop" id="btnStop" onclick="stopListening()" disabled>⏹ Detener</button>

  <button class="btn btn-summary" id="btnSummary" onclick="requestSummary()" disabled>
    📋 Generar Resumen
  </button>
  <button class="btn btn-reset" onclick="resetSession()">🔄 Nueva</button>
  <button class="btn btn-mini" onclick="openMiniWindow()" title="Abrir ventana mini">🪟 Mini</button>
</div>

<div class="main">
  <!-- Left: Transcript -->
  <div class="panel panel-left">
    <div class="panel-header">📝 Transcripción en vivo</div>
    <div class="panel-body" id="transcriptPanel">
      <div class="empty-state">
        <div class="icon">🎙️</div>
        <p>Presiona <strong>Iniciar</strong> para comenzar a escuchar la conversación</p>
      </div>
    </div>
  </div>

  <!-- Right: Coaching -->
  <div class="panel">
    <div class="panel-header">🧠 Coach en Tiempo Real</div>
    <div class="panel-body" id="coachPanel">
      <div class="empty-state">
        <div class="icon">🎯</div>
        <p>Las sugerencias del coach aparecerán aquí conforme avance la conversación</p>
      </div>
    </div>
  </div>
</div>

<!-- Summary Modal -->
<div class="modal-overlay" id="summaryModal">
  <div class="modal">
    <div class="modal-header">
      <h2>📋 Resumen de la Llamada</h2>
      <button class="btn btn-close-modal" onclick="closeSummary()">✕</button>
    </div>
    <div class="modal-body" id="summaryContent">
      <div class="loading"><span></span><span></span><span></span></div>
      Generando resumen...
    </div>
    <div class="modal-footer">
      <button class="btn btn-copy" onclick="copySummary()">📋 Copiar</button>
      <button class="btn btn-close-modal" onclick="closeSummary()">Cerrar</button>
    </div>
  </div>
</div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
let recognition = null;
let isListening = false;
let sessionId = 'session_' + Date.now();
let currentTranscript = '';
let sendTimer = null;
let transcriptStarted = false;
let coachStarted = false;

const API_BASE = window.location.origin;

// ─── Web Speech API ─────────────────────────────────────────────────────────
function initSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert('Tu navegador no soporta reconocimiento de voz. Usa Chrome.');
    return null;
  }

  const rec = new SpeechRecognition();
  rec.continuous = true;
  rec.interimResults = true;
  rec.lang = 'es-ES';
  rec.maxAlternatives = 1;

  rec.onresult = (event) => {
    let interim = '';
    let final = '';

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        final += transcript + ' ';
      } else {
        interim += transcript;
      }
    }

    // Show interim results
    if (interim) {
      updateCurrentLine(interim);
    }

    // Process final results
    if (final.trim()) {
      addTranscriptLine(final.trim());
      currentTranscript += final;

      // Debounce: send to coach after 3 seconds of silence
      clearTimeout(sendTimer);
      sendTimer = setTimeout(() => {
        if (currentTranscript.trim()) {
          sendToCoach(currentTranscript.trim());
          currentTranscript = '';
        }
      }, 3000);
    }
  };

  rec.onerror = (event) => {
    console.error('Speech error:', event.error);
    if (event.error === 'not-allowed') {
      alert('Permiso de micrófono denegado. Permite el acceso al micrófono.');
      stopListening();
    }
    // Auto-restart on network errors
    if (event.error === 'network' && isListening) {
      setTimeout(() => {
        if (isListening) recognition.start();
      }, 1000);
    }
  };

  rec.onend = () => {
    // Auto-restart if still supposed to be listening
    if (isListening) {
      try { rec.start(); } catch(e) {}
    }
  };

  return rec;
}

// ─── Controls ───────────────────────────────────────────────────────────────
function startListening() {
  if (!recognition) {
    recognition = initSpeechRecognition();
    if (!recognition) return;
  }

  try {
    recognition.start();
    isListening = true;
    updateStatus('listening');
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStop').disabled = false;
    document.getElementById('btnSummary').disabled = false;

    if (!transcriptStarted) {
      document.getElementById('transcriptPanel').innerHTML = '';
      transcriptStarted = true;
    }
  } catch(e) {
    console.error('Start error:', e);
  }
}

function stopListening() {
  isListening = false;
  if (recognition) {
    recognition.stop();
  }
  updateStatus('paused');
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').disabled = true;

  // Send any remaining transcript
  if (currentTranscript.trim()) {
    sendToCoach(currentTranscript.trim());
    currentTranscript = '';
  }
}

function resetSession() {
  stopListening();
  sessionId = 'session_' + Date.now();
  currentTranscript = '';
  transcriptStarted = false;
  coachStarted = false;

  document.getElementById('transcriptPanel').innerHTML = `
    <div class="empty-state">
      <div class="icon">🎙️</div>
      <p>Presiona <strong>Iniciar</strong> para comenzar a escuchar la conversación</p>
    </div>`;

  document.getElementById('coachPanel').innerHTML = `
    <div class="empty-state">
      <div class="icon">🎯</div>
      <p>Las sugerencias del coach aparecerán aquí conforme avance la conversación</p>
    </div>`;

  document.getElementById('btnSummary').disabled = true;
  updateStatus('off');

  fetch(`${API_BASE}/api/reset`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sessionId })
  }).catch(() => {});
}

// ─── UI Updates ─────────────────────────────────────────────────────────────
function updateStatus(state) {
  const badge = document.getElementById('statusBadge');
  const text = document.getElementById('statusText');
  badge.className = 'status-badge ' + state;

  const labels = { listening: 'Escuchando...', paused: 'Pausado', off: 'Inactivo' };
  text.textContent = labels[state] || state;
}

function addTranscriptLine(text) {
  const panel = document.getElementById('transcriptPanel');
  // Remove "current" highlight from previous lines
  panel.querySelectorAll('.transcript-current').forEach(el => el.classList.remove('transcript-current'));

  const div = document.createElement('div');
  div.className = 'transcript-line transcript-current';

  const time = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  div.innerHTML = `<div class="time">${time}</div>${escapeHtml(text)}`;

  panel.appendChild(div);
  panel.scrollTop = panel.scrollHeight;
}

function updateCurrentLine(text) {
  let current = document.querySelector('.transcript-interim');
  if (!current) {
    const panel = document.getElementById('transcriptPanel');
    current = document.createElement('div');
    current.className = 'transcript-line transcript-current transcript-interim';
    panel.appendChild(current);
  }
  current.innerHTML = `<div class="time" style="color: var(--green);">⏳ escuchando...</div>${escapeHtml(text)}`;
  const panel = document.getElementById('transcriptPanel');
  panel.scrollTop = panel.scrollHeight;

  // Remove interim when final result comes
  setTimeout(() => {
    if (current.classList.contains('transcript-interim')) {
      current.remove();
    }
  }, 10000);
}

function addCoachCard(text) {
  const panel = document.getElementById('coachPanel');

  if (!coachStarted) {
    panel.innerHTML = '';
    coachStarted = true;
  }

  const div = document.createElement('div');

  // Determine card type based on content
  let type = 'tactic';
  if (text.includes('🔴') || text.includes('OBJECIÓN')) type = 'objection';
  else if (text.includes('🟡') || text.includes('SEÑAL')) type = 'signal';
  else if (text.includes('🟢') || text.includes('CIERRE')) type = 'close';
  else if (text.includes('⚠️') || text.includes('ALERTA')) type = 'alert';
  else if (text.includes('✅')) type = 'ok';

  div.className = `coach-card ${type}`;

  const time = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
  div.innerHTML = `${escapeHtml(text)}\n<div class="coach-time">${time}</div>`;

  panel.appendChild(div);
  panel.scrollTop = panel.scrollHeight;

  // Audio ping for important cards
  if (['objection', 'close', 'alert'].includes(type)) {
    playPing();
  }
}

function showLoading() {
  const panel = document.getElementById('coachPanel');
  const loader = document.createElement('div');
  loader.id = 'coachLoader';
  loader.innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';
  panel.appendChild(loader);
  panel.scrollTop = panel.scrollHeight;
}

function hideLoading() {
  const loader = document.getElementById('coachLoader');
  if (loader) loader.remove();
}

// ─── API Calls ──────────────────────────────────────────────────────────────
async function sendToCoach(transcript) {
  showLoading();
  try {
    const res = await fetch(`${API_BASE}/api/coach`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sessionId,
        transcript,
        callType: document.getElementById('callType').value
      })
    });
    const data = await res.json();
    hideLoading();

    if (data.coaching) {
      addCoachCard(data.coaching);
    }
  } catch (e) {
    hideLoading();
    console.error('Coach API error:', e);
    addCoachCard('⚠️ Error de conexión con el coach. Verifica que el servidor esté corriendo.');
  }
}

async function requestSummary() {
  const modal = document.getElementById('summaryModal');
  const content = document.getElementById('summaryContent');
  modal.classList.add('show');
  content.innerHTML = '<div class="loading"><span></span><span></span><span></span></div> Generando resumen completo...';

  try {
    const res = await fetch(`${API_BASE}/api/summary`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sessionId,
        callType: document.getElementById('callType').value
      })
    });
    const data = await res.json();
    content.textContent = data.summary || 'No se pudo generar el resumen.';
  } catch (e) {
    content.textContent = 'Error al generar resumen: ' + e.message;
  }
}

function closeSummary() {
  document.getElementById('summaryModal').classList.remove('show');
}

function copySummary() {
  const text = document.getElementById('summaryContent').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '✅ Copiado!';
    setTimeout(() => btn.textContent = '📋 Copiar', 2000);
  });
}

// ─── Helpers ────────────────────────────────────────────────────────────────
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function playPing() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 800;
    osc.type = 'sine';
    gain.gain.value = 0.1;
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start();
    osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

// ─── Mini Mode & Popup ──────────────────────────────────────────────────────
function openMiniWindow() {
  const url = window.location.origin + '/copilot?mini=1';
  window.open(url, 'SalesCopilotMini', 'width=380,height=600,top=100,right=0,resizable=yes,scrollbars=yes');
}

// Auto-detect mini mode from URL
(function() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('mini') === '1') {
    document.body.classList.add('mini-mode');
  }
})();

// ─── Keyboard Shortcuts ─────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.ctrlKey) {
    e.preventDefault();
    isListening ? stopListening() : startListening();
  }
  if (e.code === 'KeyS' && e.ctrlKey) {
    e.preventDefault();
    requestSummary();
  }
});
</script>

</body>
</html>
