<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 Sales Copilot</title>
<style>
  :root {
    --bg:#0a0a0f; --surface:#14141f; --surface2:#1e1e2e;
    --border:#2a2a3e; --text:#e0e0e0; --muted:#888;
    --accent:#6c5ce7; --green:#00b894; --red:#e74c3c;
    --yellow:#fdcb6e; --blue:#74b9ff;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

  header{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
  .logo{font-size:15px;font-weight:700;white-space:nowrap}
  .prospect-input{flex:1;min-width:180px;background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:6px 12px;border-radius:8px;font-size:13px}
  .prospect-input::placeholder{color:var(--muted)}
  .status-badge{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
  .status-badge.listening{background:rgba(0,184,148,.15);color:var(--green)}
  .status-badge.paused{background:rgba(253,203,110,.15);color:var(--yellow)}
  .status-badge.off{background:rgba(136,136,136,.15);color:var(--muted)}
  .pulse{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}

  .controls{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
  select.call-type{background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:7px 10px;border-radius:8px;font-size:13px;cursor:pointer}
  .btn{padding:7px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
  .btn-start{background:var(--green);color:#fff}
  .btn-start:hover{background:#00a884}
  .btn-stop{background:var(--red);color:#fff}
  .btn-stop:hover{background:#c0392b}
  .btn-summary{background:var(--accent);color:#fff}
  .btn-summary:hover{background:#5a4bd1}
  .btn-secondary{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
  .btn-mini{background:var(--surface2);color:var(--blue);border:1px solid var(--border)}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  .main{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:hidden}
  .panel{display:flex;flex-direction:column;overflow:hidden}
  .panel-hdr{padding:8px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
  .panel-left{border-right:1px solid var(--border)}
  .panel-body{flex:1;overflow-y:auto;padding:12px}

  .t-line{padding:7px 10px;margin-bottom:5px;border-radius:7px;font-size:13px;line-height:1.5;background:var(--surface2);border-left:3px solid var(--border)}
  .t-line.is-interim{border-left-color:var(--green);opacity:.7}
  .t-meta{font-size:10px;color:var(--muted);margin-bottom:3px}

  .c-card{padding:12px 14px;margin-bottom:8px;border-radius:9px;font-size:13px;line-height:1.6;animation:slideIn .3s ease;white-space:pre-wrap}
  @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .c-card.objection{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3)}
  .c-card.signal{background:rgba(253,203,110,.1);border:1px solid rgba(253,203,110,.3)}
  .c-card.close{background:rgba(0,184,148,.1);border:1px solid rgba(0,184,148,.3)}
  .c-card.tactic{background:rgba(116,185,255,.1);border:1px solid rgba(116,185,255,.3)}
  .c-card.alert{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.4)}
  .c-card.insight{background:rgba(108,92,231,.1);border:1px solid rgba(108,92,231,.3)}
  .c-card.ok{background:rgba(0,184,148,.05);border:1px solid rgba(0,184,148,.15);color:var(--muted);font-size:12px}

  .c-time{font-size:10px;color:var(--muted);margin-top:5px}

  .loading{display:inline-flex;gap:4px;padding:6px 0}
  .loading span{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:bounce 1.2s infinite}
  .loading span:nth-child(2){animation-delay:.2s}.loading span:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);text-align:center;gap:10px;padding:20px}
  .empty .icon{font-size:40px}
  .empty p{font-size:13px;max-width:260px;line-height:1.5}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
  .modal-overlay.show{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:90%;max-width:680px;max-height:82vh;display:flex;flex-direction:column}
  .modal-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border)}
  .modal-hdr h2{font-size:16px}
  .modal-body{padding:18px;overflow-y:auto;font-size:13px;line-height:1.7;white-space:pre-wrap}
  .modal-ftr{padding:10px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
  .btn-copy{background:var(--accent);color:#fff}

  body.mini header{padding:6px 10px}
  body.mini .logo{font-size:13px}
  body.mini .controls{padding:5px 10px;gap:5px}
  body.mini .btn{padding:5px 10px;font-size:11px}
  body.mini select.call-type{padding:5px 8px;font-size:11px}
  body.mini .main{grid-template-columns:1fr}
  body.mini .panel-left{display:none}
  body.mini .prospect-input{display:none}

  @media(max-width:650px){
    .main{grid-template-columns:1fr;grid-template-rows:40% 60%}
    .panel-left{border-right:none;border-bottom:1px solid var(--border)}
  }
</style>
</head>
<body>

<header>
  <div class="logo">🎯 Sales Copilot</div>
  <input class="prospect-input" id="prospectInfo"
    placeholder="Nombre y contexto del prospecto (ej: Carlos, dueño agencia 10 empleados, quiere más clientes)" />
  <div class="status-badge off" id="statusBadge">
    <div class="pulse"></div><span id="statusText">Inactivo</span>
  </div>
</header>

<div class="controls">
  <select class="call-type" id="callType">
    <option value="ventas">🔥 Venta</option>
    <option value="onboarding">🚀 Onboarding</option>
    <option value="consultoria">💡 Consultoría</option>
  </select>
  <button class="btn btn-start" id="btnStart" onclick="startListening()">▶ Iniciar</button>
  <button class="btn btn-stop" id="btnStop" onclick="stopListening()" disabled>⏹ Detener</button>
  <button class="btn btn-summary" id="btnSummary" onclick="requestSummary()" disabled>📋 Resumen</button>
  <button class="btn btn-secondary" onclick="resetSession()">🔄 Nueva</button>
  <button class="btn btn-mini" onclick="openMini()">🪟 Mini</button>
</div>

<div class="main">
  <div class="panel panel-left">
    <div class="panel-hdr">📝 Transcripción</div>
    <div class="panel-body" id="transcriptPanel">
      <div class="empty">
        <div class="icon">🎙️</div>
        <p>Escribe el nombre del prospecto arriba y presiona <strong>Iniciar</strong></p>
        <p style="font-size:11px;margin-top:4px">El coach escucha todo y detecta automáticamente el contexto de la conversación</p>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-hdr">🧠 Coach — <span id="prospectLabel">esperando...</span></div>
    <div class="panel-body" id="coachPanel">
      <div class="empty">
        <div class="icon">🎯</div>
        <p>Las sugerencias y insights aparecerán aquí en tiempo real</p>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="summaryModal">
  <div class="modal">
    <div class="modal-hdr">
      <h2>📋 Resumen de Llamada</h2>
      <button class="btn btn-secondary" onclick="closeSummary()">✕</button>
    </div>
    <div class="modal-body" id="summaryContent"></div>
    <div class="modal-ftr">
      <button class="btn btn-copy" onclick="copySummary()">📋 Copiar</button>
      <button class="btn btn-secondary" onclick="closeSummary()">Cerrar</button>
    </div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let recognition = null;
let isListening = false;
let sessionId = 'sess_' + Date.now();
let sendTimer = null;
let buffer = '';
let transcriptLog = []; // [{time, text}]
let coachReady = false;
let chunkCount = 0;

const API_BASE = window.location.origin;

// ─── Recognition ─────────────────────────────────────────────────────────────
function initRec() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Necesitas Chrome para el reconocimiento de voz.'); return null; }
  const r = new SR();
  r.continuous = true;
  r.interimResults = true;
  r.lang = 'es-ES';
  r.maxAlternatives = 1;

  r.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t + ' ';
      else interim += t;
    }
    if (interim) showInterim(interim);
    if (final.trim()) {
      removeInterim();
      buffer += final;
      clearTimeout(sendTimer);
      sendTimer = setTimeout(flushBuffer, 1800);
    }
  };

  r.onerror = (e) => {
    if (e.error === 'not-allowed') { alert('Permiso de micrófono denegado.'); stopListening(); return; }
    if (isListening) setTimeout(() => { try { r.start(); } catch(_){} }, 600);
  };

  r.onend = () => { if (isListening) { try { r.start(); } catch(_){} } };
  return r;
}

function flushBuffer() {
  if (!buffer.trim()) return;
  const entry = { time: now(), text: buffer.trim() };
  transcriptLog.push(entry);
  addTranscriptLine(entry);
  const txt = buffer.trim();
  buffer = '';
  chunkCount++;
  const needInsight = chunkCount % 5 === 0;
  sendToCoach(txt, needInsight);
}

// ─── Controls ─────────────────────────────────────────────────────────────────
function startListening() {
  if (!recognition) { recognition = initRec(); if (!recognition) return; }
  try {
    recognition.start();
    isListening = true;
    setStatus('listening');
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStop').disabled = false;
    document.getElementById('btnSummary').disabled = false;
    const name = (document.getElementById('prospectInfo').value.trim().split(',')[0] || 'Prospecto').trim();
    document.getElementById('prospectLabel').textContent = name;
    if (transcriptLog.length === 0) document.getElementById('transcriptPanel').innerHTML = '';
  } catch(e) { console.error(e); }
}

function stopListening() {
  isListening = false;
  clearTimeout(sendTimer);
  flushBuffer();
  if (recognition) recognition.stop();
  setStatus('paused');
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').disabled = true;
}

function resetSession() {
  stopListening();
  sessionId = 'sess_' + Date.now();
  buffer = ''; transcriptLog = []; coachReady = false; chunkCount = 0;
  document.getElementById('transcriptPanel').innerHTML = '<div class="empty"><div class="icon">🎙️</div><p>Escribe el nombre del prospecto arriba y presiona <strong>Iniciar</strong></p></div>';
  document.getElementById('coachPanel').innerHTML = '<div class="empty"><div class="icon">🎯</div><p>Las sugerencias y insights aparecerán aquí</p></div>';
  document.getElementById('prospectLabel').textContent = 'esperando...';
  document.getElementById('btnSummary').disabled = true;
  setStatus('off');
  fetch(`${API_BASE}/api/reset`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({sessionId}) }).catch(()=>{});
}

// ─── UI ───────────────────────────────────────────────────────────────────────
function setStatus(s) {
  document.getElementById('statusBadge').className = 'status-badge ' + s;
  document.getElementById('statusText').textContent = {listening:'Escuchando...',paused:'Pausado',off:'Inactivo'}[s]||s;
}

function addTranscriptLine({time, text}) {
  const p = document.getElementById('transcriptPanel');
  const d = document.createElement('div');
  d.className = 't-line';
  d.innerHTML = `<div class="t-meta">${time}</div>${esc(text)}`;
  p.appendChild(d);
  p.scrollTop = p.scrollHeight;
}

function showInterim(text) {
  const p = document.getElementById('transcriptPanel');
  let el = document.getElementById('interimLine');
  if (!el) { el = document.createElement('div'); el.id='interimLine'; el.className='t-line is-interim'; p.appendChild(el); }
  el.innerHTML = `<div class="t-meta">⏳ escuchando...</div>${esc(text)}`;
  p.scrollTop = p.scrollHeight;
}

function removeInterim() { const el=document.getElementById('interimLine'); if(el) el.remove(); }

function addCoachCard(text) {
  const p = document.getElementById('coachPanel');
  if (!coachReady) { p.innerHTML = ''; coachReady = true; }
  const d = document.createElement('div');
  let type = 'tactic';
  if (text.includes('🔴')||text.includes('OBJECIÓN')) type='objection';
  else if (text.includes('🟡')||text.includes('SEÑAL')) type='signal';
  else if (text.includes('🟢')||text.includes('CIERRE')) type='close';
  else if (text.includes('⚠️')||text.includes('ALERTA')) type='alert';
  else if (text.includes('🔍')||text.includes('INSIGHT')) type='insight';
  else if (text.includes('✅')) type='ok';
  d.className = 'c-card ' + type;
  d.innerHTML = esc(text) + `\n<div class="c-time">${now()}</div>`;
  p.appendChild(d);
  p.scrollTop = p.scrollHeight;
  if (['objection','close','alert'].includes(type)) ping();
}

// ─── API ──────────────────────────────────────────────────────────────────────
async function sendToCoach(transcript, includeInsight=false) {
  const p = document.getElementById('coachPanel');
  const loader = document.createElement('div');
  loader.id = 'coachLoader';
  loader.innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';
  p.appendChild(loader);
  p.scrollTop = p.scrollHeight;

  // Build context: last 6 lines + current chunk
  const context = transcriptLog.slice(-6).map(e=>`[${e.time}] ${e.text}`).join('\n');
  const prospect = document.getElementById('prospectInfo').value.trim();

  try {
    const res = await fetch(`${API_BASE}/api/coach`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        sessionId, transcript: context,
        callType: document.getElementById('callType').value,
        prospectInfo: prospect,
        includeInsight
      })
    });
    const data = await res.json();
    loader.remove();
    if (data.coaching) addCoachCard(data.coaching);
  } catch(e) { loader.remove(); addCoachCard('⚠️ Error de conexión.'); }
}

async function requestSummary() {
  if (isListening) stopListening();
  document.getElementById('summaryModal').classList.add('show');
  const content = document.getElementById('summaryContent');
  content.innerHTML = '<div class="loading"><span></span><span></span><span></span></div> Generando resumen...';
  const transcript = transcriptLog.map(e=>`[${e.time}] ${e.text}`).join('\n');
  const prospect = document.getElementById('prospectInfo').value.trim();
  try {
    const res = await fetch(`${API_BASE}/api/summary`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ sessionId, callType: document.getElementById('callType').value, uiTranscript: transcript, prospectInfo: prospect })
    });
    const data = await res.json();
    content.textContent = data.summary || 'No se pudo generar.';
  } catch(e) { content.textContent = 'Error: '+e.message; }
}

function closeSummary() { document.getElementById('summaryModal').classList.remove('show'); }

function copySummary() {
  navigator.clipboard.writeText(document.getElementById('summaryContent').textContent).then(()=>{
    const b=document.querySelector('.btn-copy');
    b.textContent='✅ Copiado!'; setTimeout(()=>b.textContent='📋 Copiar',2000);
  });
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function now() { return new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
function esc(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
function ping() {
  try {
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=800;o.type='sine';g.gain.value=.1;
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
    o.start();o.stop(ctx.currentTime+.3);
  }catch(_){}
}

function openMini() {
  window.open(location.origin+'/copilot?mini=1','copilotMini','width=360,height=580,top=80,resizable=yes');
}

if (new URLSearchParams(location.search).get('mini')==='1') document.body.classList.add('mini');

document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.code==='Space') { e.preventDefault(); isListening?stopListening():startListening(); }
  if (e.ctrlKey && e.code==='KeyS')  { e.preventDefault(); requestSummary(); }
});
</script>
</body>
</html>
